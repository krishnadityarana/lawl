<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>A Question Only You Can Answer ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffe6eb, #fff);
      overflow: hidden;
    }

    h1 {
      margin-top: 120px;
      font-size: 2.8em;
      color: #d63384;
      animation: fadeIn 2s ease;
    }

    p {
      font-size: 1.2em;
      color: #555;
      animation: fadeIn 3s ease;
    }

    .btn {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    #yes {
      background: #28a745;
      color: white;
      margin-top: 40px;
      position: relative;
    }

    #yes:hover {
      transform: scale(1.1);
    }

    #no {
      background: #dc3545;
      color: white;
      position: absolute;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<h1> Are you gay ? 🫰🥳</h1>
<p> </p>

<button id="yes" class="btn">YESSSS ❤️</button>
<button id="no" class="btn">NO 😈</button>

<script>
  const noBtn = document.getElementById("no");

  document.addEventListener("mousemove", function(e) {
    const rect = noBtn.getBoundingClientRect();

    const distance = Math.hypot(
      e.clientX - (rect.left + rect.width / 2),
      e.clientY - (rect.top + rect.height / 2)
    );

    if (distance < 100) {
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 50);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }
  });

  document.getElementById("yes").onclick = function() {
    document.body.innerHTML = `
      <h1 style="margin-top: 150px; color:#28a745;">
        i knew it from the start tch tch tch ...
      </h1>
    `;
  };
</script>

</body>
</html>
