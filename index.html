<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Important Question 🤨</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      font-family: Arial, sans-serif;
      background: #ffe6eb;
      overflow: hidden;
    }

    h1 {
      margin-top: 120px;
      font-size: 2.2em;
      color: #333;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      position: absolute;
      transition: transform 0.2s;
    }

    #yes {
      background: green;
      color: white;
      position: static;
      margin-top: 40px;
    }

    #no {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

<h1>Am I shady… or are you just confidently wrong? 🤨</h1>

<button id="yes">Not shady 😌</button>
<button id="no">Shady 😈</button>

<script>
  const noBtn = document.getElementById("no");
  const yesBtn = document.getElementById("yes");

  let scale = 1;

  function moveFar() {
    const padding = 20;
    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    // shrink every time 😈
    scale *= 0.9;
    noBtn.style.transform = `scale(${scale})`;
  }

  // Desktop hover
  noBtn.addEventListener("mouseover", moveFar);

  // Mobile touch (before click)
  noBtn.addEventListener("touchstart", function(e) {
    e.preventDefault();
    moveFar();
  });

  // Finger close → run away
  document.addEventListener("touchmove", function(e) {
    const touch = e.touches[0];
    const rect = noBtn.getBoundingClientRect();

    const dist = Math.hypot(
      touch.clientX - (rect.left + rect.width / 2),
      touch.clientY - (rect.top + rect.height / 2)
    );

    if (dist < 120) {
      moveFar();
    }
  });

  // Random movement
  setInterval(moveFar, 1000);

  // If somehow clicked → escape
  noBtn.addEventListener("click", function(e) {
    e.preventDefault();
    moveFar();
  });

  // YES button result
  yesBtn.addEventListener("click", function() {
    document.body.innerHTML = `
      <h1 style="margin-top:150px;">See? Even you couldn’t prove it 😌</h1>
      <p style="font-size:1.2em;">Case closed. Not shady ✔️</p>
    `;
  });
</script>

</body>
</html>
